# Builds and pushes the pipeline image, then refreshes the Cloud Run Job image.
# Job definition (env, SA, resources) is owned by Terraform (terraform/).
substitutions:
  _REGION: us-central1
  _JOB_NAME: sdp-bq-masker
  _IMAGE: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/sdp-pipeline/sdp-bq-masker

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE}:${SHORT_SHA}
      - -t
      - ${_IMAGE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_IMAGE}:${SHORT_SHA}

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_IMAGE}:latest

  # Image-only update; Terraform owns the rest of the job config.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - ${_JOB_NAME}
      - --image=${_IMAGE}:${SHORT_SHA}
      - --region=${_REGION}
      - --project=${PROJECT_ID}

images:
  - ${_IMAGE}:${SHORT_SHA}
  - ${_IMAGE}:latest
